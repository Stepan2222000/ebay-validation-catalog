# Конфигурация валидатора. Читается ОДИН РАЗ при старте (SPEC §7) — после правки перезапусти сервис.
# DSN подключений живут в .env, не здесь.

tick_interval_sec: 30            # период горячего цикла (SPEC §5.2)
cursor_overlap_sec: 60           # насколько курсорные запросы заглядывают назад от закладки
full_reconcile_interval_sec: 86400  # период полной сверки отпечатков (SPEC §5.3)
reparse_done_retention_days: 7   # сколько хранить выполненные задачи перепарса

allowed_conditions: [new]        # допустимые значения items.condition

# Проверки: порядок важен, обрыв на первой провалившейся; проверки нет в списке =
# она выключена. Позиция dedup задаёт, кто участвует в соревновании (SPEC §3):
# dedup первым = «берём первое объявление продавца и только его проверяем дальше».
checks:
  - dedup
  - condition
  - blocklist
  - whitelist
  - price

rules:
  blocklist: []                  # записи: {pattern, match_type: word|substring, scope: global, active: true}
  whitelist:
    require: any                 # any = достаточно одного совпадения
    words: []                    # пустой список = проверка whitelist выключена
